<style>
    body, html {
        margin: 0; padding: 0; height: 100%; overflow: hidden;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(to bottom, #87ceeb, #e0f7fa);
        transition: background 1s;
    }
    canvas {
        display: block;
        margin: 0 auto;
    }
    .menu {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.85);
        color: #fff;
        padding: 30px 40px;
        border-radius: 15px;
        text-align: center;
        z-index: 1000;
        display: none;
        width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        border: 2px solid rgba(255,255,255,0.1);
    }
    .menu.active {
        display: block;
        animation: fadeIn 0.5s;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translate(-50%, -45%); }
        to { opacity: 1; transform: translate(-50%, -50%); }
    }
    button {
        margin: 12px 0;
        padding: 14px 25px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 10px;
        background: linear-gradient(to right, #f9d71c, #ffc107);
        color: #333;
        font-weight: bold;
        width: 100%;
        transition: all 0.3s;
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    button:hover {
        background: linear-gradient(to right, #ffc107, #f9d71c);
        transform: translateY(-3px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }
    button:active {
        transform: translateY(1px);
    }
    h1, h2 {
        margin-bottom: 25px;
        color: #ffeb3b;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    h1 {
        font-size: 2.5em;
        margin-top: 0;
    }
    #scoreDisplay, #goldDisplay, #playerInfoDisplay {
        position: fixed;
        top: 20px;
        font-size: 24px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        z-index: 10;
        padding: 8px 15px;
        border-radius: 10px;
        background: rgba(0,0,0,0.4);
    }
    #scoreDisplay {
        left: 20px;
    }
    #goldDisplay {
        right: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    #goldDisplay::before {
        content: '💰';
        font-size: 20px;
    }
    #playerInfoDisplay {
        left: 50%;
        transform: translateX(-50%);
        top: 20px;
        font-size: 18px;
        padding: 5px 10px;
        background: rgba(0,0,0,0.6);
        display: none;
    }
    .social-links {
        margin-top: 25px;
        font-size: 15px;
    }
    .social-links a {
        display: inline-block;
        color: #fff;
        margin: 8px 10px;
        text-decoration: none;
        transition: transform 0.3s;
    }
    .social-links a:hover {
        transform: scale(1.1);
    }
    .instagram { color: #E1306C !important; }

    .youtube { color: #FF0000 !important; }
    .telegram { color: #0088cc !important; }
    .discord { color: #7289DA !important; }
    .difficulty-selector {
        margin: 15px 0;
    }
    .difficulty-btn {
        padding: 10px;
        margin: 5px;
        font-size: 14px;
        width: auto;
        display: inline-block;
        background: linear-gradient(to right, #6c757d, #adb5bd);
        color: white;
    }
    .difficulty-btn.selected {
        background: linear-gradient(to right, #f9d71c, #ffc107);
        color: #333;
    }
    .language-selector {
        display: flex;

    }
    .language-selector button {

    .language-selector button.selected {

    }
    .store-items {

    .store-item {

        text-align: center;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 2px solid transparent;

    .store-item:hover {
        transform: translateY(-5px);

    }
    .store-item.selected-color {

    }
    .store-item.purchased {

    }
    .store-item-canvas {

        height: 60px;

        display: block;
        border: 2px solid rgba(0,0,0,0.3);

        font-size: 16px;
        height: 20px;

    // Müzik ve ses değişkenleri
    let mainMenuMusic;
    let gameMusic;
    let gameOverMusic;
    let jumpSound;
    let coinSound;
    let hitSound;
    
    // Ses seviyeleri için sabitler (artık slider'dan okunacak)
    const musicVolume = 0.5;
    const gameMusicVolume = 0.3;
    const gameOverMusicVolume = 0.6;
    const jumpVolume = 0.5;
    const coinVolume = 0.7;
    const hitVolume = 0.8;

    let globalVolume = localStorage.getItem('globalVolume') || 0.5;

    // Müziği yükleme fonksiyonu
    function loadMusic() {
        mainMenuMusic = new Audio('main_menu_music.mp3');
        gameMusic = new Audio('main_menu_music.mp3'); 
        gameOverMusic = new Audio('256113_3263906-lq.mp3');
        jumpSound = new Audio('pixel-jump-319167.mp3');
        coinSound = new Audio('retro-coin-4-236671.mp3');
        hitSound = new Audio('hit-sound.mp3');

        // Müzikleri döngüye al
        mainMenuMusic.loop = true;
        gameMusic.loop = true;

        const volumeSlider = document.getElementById('volumeSlider');
        volumeSlider.value = globalVolume;
        setVolume(globalVolume);

        volumeSlider.oninput = (e) => setVolume(e.target.value);
    }
    
    // Ses seviyelerini ayarlama
    function setVolume(volume) {
        globalVolume = parseFloat(volume);
        
        mainMenuMusic.volume = globalVolume * musicVolume;
        gameMusic.volume = globalVolume * gameMusicVolume;
        gameOverMusic.volume = globalVolume * gameOverMusicVolume;
        jumpSound.volume = globalVolume * jumpVolume;
        coinSound.volume = globalVolume * coinVolume;
        hitSound.volume = globalVolume * hitVolume;

        const volumeValueSpan = document.getElementById('volumeValue');
        volumeValueSpan.textContent = `${Math.round(globalVolume * 100)}%`;

        localStorage.setItem('globalVolume', globalVolume);
    }

    // Menü müziğini çalma
    function playMainMenuMusic() {
        stopAllMusic();
        mainMenuMusic.play().catch(e => console.error("Ana menü müziği çalınamadı:", e));
    }

    // Oyun müziğini çalma
    function playGameMusic() {
        stopAllMusic();
        gameMusic.play().catch(e => console.error("Oyun müziği çalınamadı:", e));
    }

    // Oyun bitti müziğini çalma
    function playGameOverMusic() {
        stopAllMusic();
        gameOverMusic.currentTime = 0;
        gameOverMusic.play().catch(e => console.error("Oyun bitti müziği çalınamadı:", e));
    }

    // Zıplama sesini çalma
    function playJumpSound() {
        jumpSound.currentTime = 0;
        jumpSound.play().catch(e => console.error("Zıplama sesi çalınamadı:", e));
    }

    // Altın toplama sesini çalma
    function playCoinSound() {
        coinSound.currentTime = 0;
        coinSound.play().catch(e => console.error("Altın sesi çalınamadı:", e));
    }
    
    // Çarpma/ölme sesini çalma
    function playHitSound() {
        hitSound.currentTime = 0;
        hitSound.play().catch(e => console.error("Çarpma sesi çalınamadı:", e));
    }

    // Tüm müzikleri durdurma
    function stopAllMusic() {
        mainMenuMusic.pause();
        mainMenuMusic.currentTime = 0;

        gameMusic.pause();
        gameMusic.currentTime = 0;

        gameOverMusic.pause();
        gameOverMusic.currentTime = 0;

        // Ses efektlerini de durdurabilirsin, isteğe bağlı
        jumpSound.pause();
        jumpSound.currentTime = 0;
        coinSound.pause();
        coinSound.currentTime = 0;
        hitSound.pause();
        hitSound.currentTime = 0;
    }

        updateUI();

    function updateUI() {
        const elements = document.querySelectorAll('[data-lang]');
        elements.forEach(el => {
            const key = el.dataset.lang;
            if (translations[currentLanguage][key]) {
                el.textContent = translations[currentLanguage][key];
            }
        });

        const prefixElements = document.querySelectorAll('[data-lang-prefix]');
        prefixElements.forEach(el => {
            const key = el.dataset.langPrefix;
            const text = translations[currentLanguage][key];
            const originalValue = el.textContent.split(':').pop().trim();
            el.textContent = text + " " + originalValue;
        });

        document.querySelector('[data-lang="forestCourse"]').textContent = translations[currentLanguage].forestCourse;

    class Cloud {
        constructor() {
            this.x = W + Math.random() * 100;
            this.y = Math.random() * (H / 3);
            this.width = 100 + Math.random() * 100;
            this.height = 50 + Math.random() * 40;
            this.speed = 0.5 + Math.random() * 1.5;
        }

        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.beginPath();
            ctx.ellipse(this.x, this.y, this.width/2, this.height/2, 0, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.ellipse(this.x - this.width/4, this.y + this.height/4, this.width/3, this.height/3, 0, 0, Math.PI * 2);
            ctx.ellipse(this.x + this.width/4, this.y + this.height/4, this.width/3, this.height/3, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        update() {
            this.x -= this.speed;
            if (this.x + this.width < 0) {
                this.x = W + Math.random() * 100;
                this.y = Math.random() * (H / 3);
            }
        }
    }

    class Gold {
        constructor(x, y, value = 1) {
            this.x = x;
            this.y = y;
            this.width = GOLD_SIZE;
            this.height = GOLD_SIZE;
            this.value = value;
            this.collected = false;
        }

        draw() {
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#FFD700';

            const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y + this.height);
            gradient.addColorStop(0, '#FFD700');
            gradient.addColorStop(0.5, '#FFEC8B');
            gradient.addColorStop(1, '#FFD700');
            ctx.fillStyle = gradient;

            ctx.beginPath();
            ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.beginPath();
            ctx.arc(this.x + this.width / 2, this.y + this.height / 2, this.width / 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            ctx.fillStyle = '#A0522D';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('$', this.x + this.width / 2, this.y + this.height / 2);
        }

        update(speed) {
            this.x -= speed;
        }
    }

    class Player {
        constructor(x, initialColor, controls, gold = 0, purchasedColors = []) {
            this.x = x;
            this.y = H / 2;
            this.width = PLAYER_WIDTH;
            this.height = PLAYER_HEIGHT;
            this.vy = 0;
            this.gravity = GRAVITY;
            this.jumpPower = PLAYER_JUMP_POWER;
            this.color = initialColor;
            this.controls = controls;
            this.score = 0;
            this.gold = gold;
            this.purchasedColors = purchasedColors;
            this.alive = true;
            this.animationFrame = 0;
            this.wingState = 0;
        }

        draw(targetCtx = ctx, drawX = this.x, drawY = this.y, scale = 1) {
            const currentWidth = this.width * scale;
            const currentHeight = this.height * scale;

            targetCtx.shadowColor = 'rgba(0,0,0,0.4)';
            targetCtx.shadowBlur = 10;
            targetCtx.shadowOffsetX = 5;
            targetCtx.shadowOffsetY = 5;

            if (!this.alive) {
                targetCtx.fillStyle = this.color + '80';
            } else {
                const bodyGradient = targetCtx.createRadialGradient(
                    drawX + currentWidth * 0.4, drawY + currentHeight * 0.4, 10,
                    drawX + currentWidth / 2, drawY + currentHeight / 2, currentWidth / 2
                );
                bodyGradient.addColorStop(0, '#fff');
                bodyGradient.addColorStop(1, this.color);
                targetCtx.fillStyle = bodyGradient;
            }

            targetCtx.beginPath();
            targetCtx.ellipse(drawX + currentWidth / 2, drawY + currentHeight / 2,
                                    currentWidth / 2, currentHeight / 2, 0, 0, Math.PI * 2);
            targetCtx.fill();

            targetCtx.shadowBlur = 0;
            targetCtx.shadowOffsetX = 0;
            targetCtx.shadowOffsetY = 0;

            targetCtx.fillStyle = this.color === '#f9d71c' ? '#ffeb3b' : this.color;
            const wingX = drawX + currentWidth / 2;
            const wingY = drawY + currentHeight / 2;
            const wingWidth = currentWidth * 0.7;
            const wingHeight = currentHeight * 0.4;

            let wingOffset = 0;
            if (this.wingState === 0) {
                wingOffset = -wingHeight * 0.5;
            } else {
                wingOffset = wingHeight * 0.5;
            }

            targetCtx.beginPath();
            targetCtx.moveTo(wingX, wingY);
            targetCtx.quadraticCurveTo(
                wingX - wingWidth / 2, wingY + wingOffset - wingHeight,
                wingX - wingWidth, wingY + wingOffset
            );
            targetCtx.lineTo(wingX, wingY);
            targetCtx.fill();

            targetCtx.beginPath();
            targetCtx.moveTo(wingX, wingY);
            targetCtx.quadraticCurveTo(
                wingX + wingWidth / 2, wingY + wingOffset - wingHeight,
                wingX + wingWidth, wingY + wingOffset
            );
            targetCtx.lineTo(wingX, wingY);
            targetCtx.fill();

            targetCtx.fillStyle = '#000';
            targetCtx.beginPath();
            ctx.arc(drawX + currentWidth / 1.5, drawY + currentHeight / 3, 5 * scale, 0, Math.PI * 2);
            targetCtx.fill();
            
            targetCtx.fillStyle = '#FF5722';
            targetCtx.beginPath();
            ctx.moveTo(drawX + currentWidth, drawY + currentHeight / 2);
            ctx.lineTo(drawX + currentWidth + (10 * scale), drawY + currentHeight / 2);
            ctx.lineTo(drawX + currentWidth, drawY + currentHeight / 2 + (5 * scale));
            targetCtx.fill();
        }

        update() {
            this.animationFrame++;
            if (this.animationFrame % WING_ANIMATION_SPEED === 0) {
                this.wingState = 1 - this.wingState;
            }

            this.vy += this.gravity;
            this.y += this.vy;

            if (this.y + this.height > H - GROUND_HEIGHT) {
                this.y = H - GROUND_HEIGHT - this.height;
                this.vy = 0;
            }

            if (this.y < CEILING_HEIGHT) {
                this.y = CEILING_HEIGHT;
                this.vy = this.gravity;
            }
        }

        jump() {
            if (this.alive) {
                this.vy = this.jumpPower;
                this.wingState = 0;
                playJumpSound();
            }
        }

        addScore(points) {
            this.score += points;
            updateScoreDisplays();
        }

        addGold(amount) {
            this.gold += amount;
            updateGoldDisplay();
            saveGameData();
        }

        changeColor(newColor) {
            this.color = newColor;
            saveGameData();
            updatePlayerInfoDisplay();
        }
    }

    class Obstacle {
        constructor(x, width, height, color, isTop = false) {
            this.x = x;
            this.width = width;
            this.height = height;
            this.color = color;
            this.passed = false;
            this.isTop = isTop;

            if (isTop) {
                this.y = CEILING_HEIGHT;
            } else {
                this.y = H - GROUND_HEIGHT - height;
            }
        }

        draw() {
            const gradient = ctx.createLinearGradient(this.x, this.y, this.x + this.width, this.y + this.height);
            gradient.addColorStop(0, this.color);
            gradient.addColorStop(1, '#555');
            ctx.fillStyle = gradient;

            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 5;
            ctx.shadowOffsetY = 5;

            ctx.beginPath();
            if (this.isTop) {
                ctx.moveTo(this.x + CORNER_RADIUS, this.y);
                ctx.lineTo(this.x + this.width - CORNER_RADIUS, this.y);
                ctx.arcTo(this.x + this.width, this.y, this.x + this.width, this.y + CORNER_RADIUS, CORNER_RADIUS);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.lineTo(this.x, this.y + CORNER_RADIUS);
                ctx.arcTo(this.x, this.y, this.x + CORNER_RADIUS, this.y, CORNER_RADIUS);
            } else {
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.width, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height - CORNER_RADIUS);
                ctx.arcTo(this.x + this.width, this.y + this.height, this.x + this.width - CORNER_RADIUS, this.y + this.height, CORNER_RADIUS);
                ctx.lineTo(this.x + CORNER_RADIUS, this.y + this.height);
                ctx.arcTo(this.x, this.y + this.height, this.x, this.y + this.height - CORNER_RADIUS, CORNER_RADIUS);
                ctx.lineTo(this.x, this.y);
            }
            ctx.closePath();
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            const parkurSettings = parkurs[currentParkur];
            ctx.fillStyle = parkurSettings.detailObstacle;
            
            if (this.isTop) {
                const spikeCount = Math.floor(this.width / SPIKE_WIDTH);
                for (let i = 0; i < spikeCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + (i * this.width / spikeCount), this.y + this.height);
                    ctx.lineTo(this.x + (i * this.width / spikeCount) + SPIKE_WIDTH / 2, this.y + this.height + SPIKE_HEIGHT);
                    ctx.lineTo(this.x + (i * this.width / spikeCount) + SPIKE_WIDTH, this.y + this.height);
                    ctx.closePath();
                    ctx.fill();
                }
            } else {
                const spikeCount = Math.floor(this.width / SPIKE_WIDTH);
                for (let i = 0; i < spikeCount; i++) {
                    ctx.beginPath();
                    ctx.moveTo(this.x + (i * this.width / spikeCount), this.y);
                    ctx.lineTo(this.x + (i * this.width / spikeCount) + SPIKE_WIDTH / 2, this.y - SPIKE_HEIGHT);
                    ctx.lineTo(this.x + (i * this.width / spikeCount) + SPIKE_WIDTH, this.y);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }

        update(speed) {
            this.x -= speed;
        }
    }

    function startGame(mode, parkur) {
        currentMode = 'single';
        currentParkur = parkur;

        const parkurSettings = parkurs[parkur];
        groundColor = parkurSettings.ground;
        obstacleColor = parkurSettings.obstacle;

        gameSpeed = difficulties[currentDifficulty].speed;

        const savedData = loadGameData();
        player1 = new Player(
            PLAYER_INITIAL_X,
            savedData.playerColor || storeItems[0].color,
            { jump: 'Space' },
            savedData.gold,
            savedData.purchasedColors
        );

        obstacles = [];
        clouds = [];
        goldCoins = [];
        frameCount = 0;
        gameRunning = true;
        gamePaused = false;
        gameStartTime = Date.now();

        for (let i = 0; i < 5; i++) {
            clouds.push(new Cloud());
        }

        showMenu(null);
        updateScoreDisplays();
        updateGoldDisplay();
        updatePlayerInfoDisplay();

        playGameMusic();

        gameLoop();
    }

    function gameLoop() {
        if (!gameRunning || gamePaused) return;

        ctx.clearRect(0, 0, W, H);

        const gradient = ctx.createLinearGradient(0, 0, 0, H);
        const bgColorsMatch = parkurs[currentParkur].bg.match(/#[0-9a-fA-F]{6}/g);
        if (bgColorsMatch && bgColorsMatch.length >= 2) {
                gradient.addColorStop(0, bgColorsMatch[0]);
                gradient.addColorStop(1, bgColorsMatch[1]);
        } else {
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#e0f7fa');
        }
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, W, H);

        clouds.forEach(cloud => {
            cloud.update();
            cloud.draw();
        });
        
        ctx.shadowColor = 'rgba(0,0,0,0.3)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = -10;

        const groundGradient = ctx.createLinearGradient(0, H - GROUND_HEIGHT, 0, H);
        groundGradient.addColorStop(0, groundColor);
        groundGradient.addColorStop(1, '#555');
        ctx.fillStyle = groundGradient;
        ctx.fillRect(0, H - GROUND_HEIGHT, W, GROUND_HEIGHT);

        ctx.shadowOffsetY = 10;
        const ceilingGradient = ctx.createLinearGradient(0, 0, 0, CEILING_HEIGHT);
        ceilingGradient.addColorStop(0, '#555');
        ceilingGradient.addColorStop(1, groundColor);
        ctx.fillStyle = ceilingGradient;
        ctx.fillRect(0, 0, W, CEILING_HEIGHT);

        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;

        const parkurSettings = parkurs[currentParkur];
        ctx.fillStyle = parkurSettings.detailGround;

        for (let x = 0; x < W; x += 60) {
            ctx.beginPath();
            ctx.arc(x, H - GROUND_HEIGHT, 10, 0, Math.PI, true);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, CEILING_HEIGHT, 10, Math.PI, 0, true);
            ctx.fill();
        }

        player1.update();
        player1.draw();

        if (frameCount % Math.floor(difficulties[currentDifficulty].obstacleGap / (gameSpeed / 3)) === 0) {
            const maxHeight = H / 3;

            const bottomHeight = MIN_OBSTACLE_HEIGHT + Math.random() * (maxHeight - MIN_OBSTACLE_HEIGHT);
            obstacles.push(new Obstacle(W, OBSTACLE_WIDTH, bottomHeight, obstacleColor));

            if (Math.random() < 0.6) {
                const topHeight = MIN_OBSTACLE_HEIGHT + Math.random() * (maxHeight - MIN_OBSTACLE_HEIGHT);
                const verticalGapForPlayer = PLAYER_HEIGHT * 2.5;

                const topObstacleBottomY = CEILING_HEIGHT + topHeight;
                const bottomObstacleTopY = H - GROUND_HEIGHT - bottomHeight;

                if ((bottomObstacleTopY - topObstacleBottomY) > verticalGapForPlayer) {
                    obstacles.push(new Obstacle(W + (OBSTACLE_WIDTH * 2) + Math.random() * 100, OBSTACLE_WIDTH, topHeight, obstacleColor, true));
                }
            }
        }

        if (frameCount % Math.floor(GOLD_SPAWN_FREQUENCY / (gameSpeed/2)) === 0 && Math.random() < GOLD_SPAWN_CHANCE) {
            const goldY = CEILING_HEIGHT + Math.random() * (H - GROUND_HEIGHT - CEILING_HEIGHT - GOLD_SIZE);
            goldCoins.push(new Gold(W, goldY));
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].update(gameSpeed);
            obstacles[i].draw();

            if (isColliding(player1, obstacles[i])) {
                player1.alive = false;
                playHitSound();
            }

            if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < player1.x) {
                obstacles[i].passed = true;
                player1.addScore(SCORE_PER_OBSTACLE);
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
            }
        }

        for (let i = goldCoins.length - 1; i >= 0; i--) {
            goldCoins[i].update(gameSpeed);
            goldCoins[i].draw();

            if (isColliding(player1, goldCoins[i]) && !goldCoins[i].collected) {
                goldCoins[i].collected = true;
                player1.addGold(goldCoins[i].value);
                playCoinSound();
                goldCoins.splice(i, 1);
            } else if (goldCoins[i].x + goldCoins[i].width < 0) {
                goldCoins.splice(i, 1);
            }
        }

        if (!player1.alive) {
            gameOver();
            return;
        }

        frameCount++;
        requestAnimationFrame(gameLoop);
    }

    function isColliding(obj1, obj2) {
        return obj1.x < obj2.x + obj2.width &&
               obj1.x + obj1.width > obj2.x &&
               obj1.y < obj2.y + obj2.height &&
               obj1.y + obj1.height > obj2.y;
    }

    function renderStoreItems() {
        const container = document.getElementById('storeItemsContainer');
        container.innerHTML = '';

        storeItems.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.classList.add('store-item');

            const itemName = translations[currentLanguage][item.langKey];

            if (item.color === savedData.playerColor) {
                itemDiv.classList.add('selected-color');
            }
            if (savedData.purchasedColors.includes(item.color) || item.default) {
                itemDiv.classList.add('purchased');
            }

            const itemCanvas = document.createElement('canvas');
            itemCanvas.classList.add('store-item-canvas');
            itemCanvas.width = 60;
            itemCanvas.height = 60;
            const itemCtx = itemCanvas.getContext('2d');

            const tempPlayer = new Player(30, item.color, {});
            tempPlayer.draw(itemCtx, 5, 5, 1);

            itemDiv.appendChild(itemCanvas);

            const nameP = document.createElement('p');
            nameP.textContent = itemName;
            itemDiv.appendChild(nameP);

            const priceP = document.createElement('p');
            priceP.classList.add('store-item-price');
            const priceSpan = document.createElement('span');
            priceSpan.textContent = item.price;
            priceP.appendChild(priceSpan);
            itemDiv.appendChild(priceP);

            itemDiv.onclick = () => selectStoreItem(item.color, item.price, itemName);
            container.appendChild(itemDiv);
        });

    function selectStoreItem(color, price, itemName) {
        const storeMessage = document.getElementById('storeMessage');
        const savedData = loadGameData();

        if (savedData.purchasedColors.includes(color) || price === 0) {
            player1.changeColor(color);
            renderStoreItems();
            storeMessage.textContent = `${itemName} ${translations[currentLanguage].selected}`;
        } else if (player1.gold >= price) {
            player1.addGold(-price);
            player1.purchasedColors.push(color);
            saveGameData();
            player1.changeColor(color);
            renderStoreItems();
            storeMessage.textContent = `${itemName} ${translations[currentLanguage].purchased}`;
        } else {
            const neededGold = price - player1.gold;
            storeMessage.textContent = translations[currentLanguage].notEnoughGold.replace('%s', neededGold);
        }
    }

    
const GAME_DATA_KEY = 'birdPartyGameData';

function saveGameData(data) {
    try {
        const dataToSave = data || (player1 ? {
            gold: player1.gold,
            playerColor: player1.color,
            purchasedColors: player1.purchasedColors
        } : { gold: 0, playerColor: storeItems[0].color, purchasedColors: [storeItems[0].color] });
        localStorage.setItem(GAME_DATA_KEY, JSON.stringify(dataToSave));
        console.log('Game data saved to localStorage:', dataToSave);
    } catch (e) {
        console.error('Error saving game data to localStorage', e);
    }
}

function loadGameData() {
    try {
        // Try primary key first, then an older key for backwards compatibility
        let raw = localStorage.getItem(GAME_DATA_KEY);
        if (!raw) {
            raw = localStorage.getItem('birdGameData'); // old key (if any)
            if (raw) {
                // migrate to new key
                try {
                    localStorage.setItem(GAME_DATA_KEY, raw);
                    localStorage.removeItem('birdGameData');
                    console.log('Migrated old game data key birdGameData ->', GAME_DATA_KEY);
                } catch (e) { console.warn('Migration to new key failed', e); }
            }
        }
        if (raw) {
            const parsedData = JSON.parse(raw);
            console.log('Game data loaded from localStorage:', parsedData);
            // ensure required fields exist
            parsedData.gold = parsedData.gold || 0;
            parsedData.playerColor = parsedData.playerColor || storeItems[0].color;
            parsedData.purchasedColors = parsedData.purchasedColors || [storeItems[0].color];
            return parsedData;
        }
    } catch (e) {
        console.error('Error loading game data from localStorage', e);
    }

    console.log('No game data found, initializing default values.');
    const defaultData = {
        gold: 0,
        playerColor: storeItems[0].color,
        purchasedColors: [storeItems[0].color]
    };
    try { saveGameData(defaultData); } catch(e) {}
    return defaultData;
}


    let initialData;
    try {
        initialData = loadGameData();
        if (!initialData.purchasedColors) {
            initialData.purchasedColors = [storeItems[0].color];
            saveGameData(initialData);
        }
    } catch (e) {
        console.error("Failed to load initial data, starting with defaults.");
        initialData = {

            playerColor: storeItems[0].color,
            purchasedColors: [storeItems[0].color]
        };

    }

    player1 = new Player(

    );
    updateGoldDisplay();

        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W;
        canvas.height = H;
        if (gameRunning && !gamePaused) {
            player1.y = H / 2;
        }
    });

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && gameRunning && !gamePaused) {
            player1.jump();
        } else if (e.code === 'Escape' && gameRunning) {
            togglePause();
        }
    });

    canvas.addEventListener('click', (e) => {
        if (gameRunning && !gamePaused) {
            if (e.target.tagName === 'CANVAS') {
                player1.jump();
            }
        }
    });

    document.addEventListener('DOMContentLoaded', () => {
        setDifficulty('normal');
        const savedLang = localStorage.getItem('language') || 'en';
        setLanguage(savedLang);
    });

    function setDifficulty(difficulty) {
        currentDifficulty = difficulty;
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (btn.dataset.difficulty === difficulty) {
                btn.classList.add('selected');
            }
        });
    }

    // Yeni: buton sesi ekle
    let buttonClickSound = new Audio('wood_plank_flicks.ogg');

    function playButtonSound() {
        if (buttonClickSound) {
            buttonClickSound.currentTime = 0;
            buttonClickSound.volume = globalVolume * 0.7;
            buttonClickSound.play().catch(e => console.error("Buton sesi çalınamadı:", e));
        }
    }

    // Tüm butonlara tıklanınca ses çal
    window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                playButtonSound();
            });
        });
    });


// --- Yandex Games Reklam SDK Başlangıcı ---
window.onload = async () => {
  if (window.YaGames) {
    YaGames.init().then(ysdk => {
      window.ysdk = ysdk;
      console.log("✅ Yandex SDK yüklendi");

      // Test amaçlı tam ekran reklam (Yandex sistemine bildirim yapar)
      ysdk.adv.showFullscreenAdv({
        callbacks: {
          onOpen: () => console.log("Reklam açıldı"),
          onClose: () => console.log("Reklam kapandı"),
          onError: (err) => console.error("Reklam hatası:", err)
        }
      });
    });
  } else {
    console.warn("⚠️ Yandex SDK bulunamadı. Yandex Games ortamında çalıştırılmalı.");
  }
};
// --- Yandex Games Reklam SDK Sonu ---


// --- Ölüm Sayacı ve Reklam Sistemi ---
let deathCount = 0; // toplam ölüm sayısı

// Oyun bitişinde reklam kontrolü
function gameOver() {
  player1.alive = false;
  deathCount++;

  // Her 10. ölümde reklam göster
  if (deathCount % 10 === 0 && window.ysdk) {
    ysdk.adv.showFullscreenAdv({
      callbacks: {
        onOpen: () => console.log("Reklam açıldı"),
        onClose: () => console.log("Reklam kapandı"),
        onError: (err) => console.error("Reklam hatası:", err)
      }
    });
  }

  playGameOverMusic();
  showMenu("gameOverMenu");
}

</script>
